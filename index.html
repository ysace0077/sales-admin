<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Management System v2 (Supabase)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.8em;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.3em;
            font-weight: 500;
        }
        
        /* 로딩 영역 */
        .loading-area {
            background: white;
            padding: 50px 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }
        
        .loading-area h2 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid #e1e5e9;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-progress {
            color: #666;
            font-size: 1.1em;
            margin-top: 10px;
        }
        
        /* 메인 탭 네비게이션 */
        .main-tabs {
            display: flex;
            gap: 10px;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .main-tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
            background: #f8f9fa;
            color: #6c757d;
        }
        
        .main-tab:hover {
            background: #e9ecef;
        }
        
        .main-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        /* 탭 컨텐츠 */
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .status {
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 10px;
            font-weight: 600;
            text-align: center;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        /* 데이터 소스 배지 */
        .data-source-badge {
            display: inline-block;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 10px;
        }
        
        /* 반응형 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .main-tabs {
                flex-direction: column;
                gap: 5px;
            }
            
            .main-tab {
                padding: 15px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Sales Management System</h1>
            <div class="data-source-badge">☁️ Supabase Cloud DB</div>
        </header>
        
        <!-- 로딩 영역 -->
        <div id="loadingArea" class="loading-area">
            <div class="loading-spinner"></div>
            <h2>☁️ Supabase 데이터베이스 연결 중...</h2>
            <div id="loadingProgress" class="loading-progress">데이터를 불러오는 중입니다...</div>
        </div>
        
        <!-- 메인 탭 네비게이션 -->
        <div id="mainTabs" class="main-tabs" style="display: none;">
            <div class="main-tab active" data-tab="report">
                📈 매출 리포트
            </div>
            <div class="main-tab" data-tab="calendar">
                📅 매출 캘린더
            </div>
            <div class="main-tab" data-tab="customer">
                👥 고객 조회
            </div>
        </div>
        
        <!-- 탭 컨텐츠 영역 -->
        <div id="reportTab" class="tab-content active"></div>
        <div id="customerTab" class="tab-content"></div>
        <div id="calendarTab" class="tab-content"></div>
    </div>
    
    <script src="supabase-db.js?v=7"></script>
    <script src="report-module-fixed.js?v=4"></script>
    <script src="report-charts-1.js?v=2"></script>
    <script src="report-charts-2.js?v=2"></script>
    <script src="report-charts-3.js?v=2"></script>
    <script src="report-charts-4.js?v=2"></script>
    <script src="report-charts-5.js?v=2"></script>
    <script src="report-charts-6.js?v=6"></script>
    <script src="customer-module.js?v=2"></script>
    <script src="calendar-module.js?v=2"></script>
    <script src="app.js?v=2"></script>
</body>
</html>
